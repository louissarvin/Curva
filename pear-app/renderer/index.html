<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curva</title>
    <!--
      Content Security Policy. Strict by design: no unsafe-inline for scripts,
      no wildcards on script-src, object-src disabled. Loopback allowances for
      hypercore-blob-server (127.0.0.1:49833 by default, plus 127.0.0.1:* to
      cover anyPort:true fallback when the default port is taken). connect-src
      lets the renderer talk to the local backend (localhost:3700). Docs:
        https://www.electronjs.org/docs/latest/tutorial/security#5-do-not-disable-websecurity
        https://cheatsheetseries.owasp.org/cheatsheets/Content_Security_Policy_Cheat_Sheet.html
        https://github.com/holepunchto/hypercore-blob-server
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: http://127.0.0.1:49833 http://127.0.0.1:*; media-src 'self' blob: http://127.0.0.1:49833 http://127.0.0.1:*; connect-src 'self' http://localhost:3700 http://127.0.0.1:3700 https://fonts.googleapis.com https://fonts.gstatic.com; object-src 'none'"
    />
    <!-- Urbanist (body) + Playfair Display (headings) from Google Fonts.
         preconnect is safe here: we only contact fonts.googleapis.com and
         fonts.gstatic.com. No user-supplied data is sent.
         font-display:swap ensures text is readable before fonts arrive.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Phase 4 boot splash: full-viewport, hides once the Bare worker emits `ready`. -->
    <div class="curva-boot" data-boot>
      <div class="curva-boot__mark">
        <!-- Curva brand mark. Ships as a self-contained SVG next to index.html so
             the splash renders even before the Bare worker starts. -->
        <img class="curva-boot__logo" src="./logo-index.svg" alt="Curva" />
      </div>
      <div class="curva-boot__tag">watch the world cup with friends</div>
      <div class="curva-boot__status" data-boot-status>Booting Curva runtime…</div>
      <div class="curva-boot__hint" data-boot-hint>this may take 5-45s on first launch (DHT bootstrap)</div>
      <div class="curva-boot__dots"><span></span><span></span><span></span></div>
    </div>

    <div id="app"></div>

    <!-- Phase 2 shell: header bar + browser (pre-room) OR room grid (in room) -->
    <template id="app-shell">
      <main class="curva-app">
        <header class="curva-app__topbar">
          <div class="curva-app__brand">
            <img class="curva-app__brand-logo" src="./logo.svg" alt="Curva" />
          </div>
          <div class="curva-app__topbar-right">
            <span class="curva-app__topbar-peers" data-topbar="peers">0 peers</span>
            <span class="curva-app__topbar-blind" data-topbar="blind" hidden></span>
            <span class="curva-app__topbar-wallet" data-topbar="wallet" hidden></span>
            <span class="curva-app__topbar-version" data-version></span>
            <!-- Diag items: hidden unless ?diag=1 -->
            <span class="curva-app__topbar-item" data-topbar="dht"></span>
            <span class="curva-app__topbar-item" data-topbar="pubkey"></span>
          </div>
        </header>

        <div class="curva-app__body">
          <!-- Left column: room content OR browser -->
          <section class="curva-app__main">
            <div class="curva-app__browser" data-mount="browser"></div>
            <div class="curva-app__room" data-mount="room" hidden>
              <div class="curva-app__room-header" data-mount="room-header"></div>
              <div class="curva-app__room-grid">
                <div class="curva-app__video" data-mount="video"></div>
                <div class="curva-app__chat" data-mount="chat"></div>
              </div>
              <div class="curva-app__clips" data-mount="clips"></div>
            </div>
          </section>

          <!-- Right column: activity feed + event log -->
          <aside class="curva-app__aside">
            <div class="curva-app__feed" data-mount="feed"></div>
            <div class="curva-app__log-panel">
              <h3 class="curva-app__log-title">events</h3>
              <ul class="curva-app__log" data-log></ul>
            </div>
          </aside>
        </div>

        <!-- Dev-only diagnostic footer (activated by ?diag=1). -->
        <footer class="curva-diag" data-mount="diag" hidden></footer>
      </main>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
